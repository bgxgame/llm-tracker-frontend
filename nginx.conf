# 1. 处理 80 端口 HTTP 跳转到 HTTPS
server {
    listen 80;
    server_name llmtamer.cfcedd.com;

    # 用于 Let's Encrypt 验证
    location /.well-known/acme-challenge/ {
        root /usr/share/nginx/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# 2. HTTPS 主服务
server {
    listen 443 ssl;
    server_name llmtamer.cfcedd.com;

    # 证书路径（对应 Docker Compose 中的映射路径）
    ssl_certificate     /etc/letsencrypt/live/llmtamer.cfcedd.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/llmtamer.cfcedd.com/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # 前端静态资源
    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        try_files $uri $uri/ /index.html; # 解决 Vue Router 404 问题
    }

    # 后端 API 代理
    location /api {
        # 这里的 llm-backend 是 docker-compose 中的服务名
        proxy_pass http://llm-backend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}